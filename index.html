<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vinyl Collection</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <main>
            <!-- Stack display -->
            <div class="stack-container">
                <div id="stack" class="stack">
                    <!-- Album covers will be rendered here -->
                </div>
            </div>

            <!-- Loading and error states -->
            <div id="loading" class="loading">Loading your collection...</div>
            <div id="error" class="error"></div>
        </main>
    </div>

    <!-- Detail Modal -->
    <div id="modal-backdrop" class="modal-backdrop" style="display: none;">
        <div class="modal">
            <button class="modal-close" id="modal-close">✕</button>
            
            <div class="modal-content">
                <div class="modal-cover-section">
                    <div id="modal-cover" class="modal-cover">
                        <img id="modal-cover-img" src="" alt="Album cover" />
                    </div>
                </div>
                
                <div class="modal-info-section">
                    <h2 id="modal-title" class="modal-title"></h2>
                    <p id="modal-artist" class="modal-artist"></p>
                    
                    <div class="modal-tracks">
                        <h3>Track List</h3>
                        <div id="modal-tracklist" class="tracklist">
                            <!-- Tracks will be rendered here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
